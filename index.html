<!DOCTYPE html>
<html lang="pt-BR">
    <head>
    <title>Volpe Crochê</title>
    <link rel="preconnet" href="https://fonts.googleapis.com">
    <link rel="preconnet" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head> 
<body>
    <div class="main">
        <div class="barra">
            <div class="icone">

    
                <img src="raposaf.png" class="raposa">
                <h2 class="logo">
                    Volpe<br>
                    Crochê
                </h2>
            </div>

            <div class="menu">
                <ul>
                    <li><a href="#">Cropped</a></li>
                    <li><a href="#">Short</a></li>
                    <li><a href="#">Vestido</a></li>
                    <li><a href="#">Infantil</a></li>
                    <li><a href="#">Masculino</a></li>                
                </ul>
            </div>

            <div class="pesquisa">
                <input 
                type="text"
                class="srch"
                placeholder="Buscar seu novo look">
                <button type="submit" class="btn">
                    Pesquisa
                </button>
            </div>
        </div>
    </div>
    <div class="hero">
        <div class="hero-conteudo">

            <h1>VOLPE CROCHÊ</h1>
    
            <h2>
                Peças feitas à mão,<br>
                histórias feitas para durar.
            </h2>
        
                <a href="#mais-vendidos" class="hero-btn">
                    Ver coleção
                </a>


    </div>
    
</div>
<section class="mais-vendidos" id="mais-vendidos">
    
        <h2>Mais vendidos</h2>
        <div class="produtos-grid">
            <div class="card-produto">
                <img src="croppedfenix.jpeg">
                <h3>Cropped Fenix</h3>
                <p>R$85,00</p>
            </div>
            <div class="card-produto">
                <img src="lunafoco.jpeg">
                <h3>Cropped Luna</h3>
                <p>R$75,00</p>
            </div>
            <div class="card-produto">
                <img src="croppedMia.jpeg">
                <h3>Cropped Mia</h3>
                <p>R$65,00</p>
            </div>
    </div>
    </section>
</body>
</html>
